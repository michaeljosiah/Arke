<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arke · launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#09090A;
    --paper:#FAFAFA;
    --slash:#9DA3A8;
    --muted:#7A7F85;
    --line:rgba(255,255,255,.07);
    --line-2:rgba(255,255,255,.13);
    --live:#4ADE80;
    --ease:cubic-bezier(.2,.7,.2,1);
    --ease-out:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:"Geist",system-ui,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 90% at 50% 42%, #131316 0%, #0B0B0D 46%, #070708 100%);
  }

  /* ---------- ambient layers (resting state: visible/static) ---------- */
  .grid{
    position:absolute; inset:-2px;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:64px 64px;
    -webkit-mask-image:radial-gradient(70% 60% at 50% 45%, #000 0%, rgba(0,0,0,.35) 55%, transparent 78%);
            mask-image:radial-gradient(70% 60% at 50% 45%, #000 0%, rgba(0,0,0,.35) 55%, transparent 78%);
  }
  .scan{
    position:absolute; left:0; right:0; height:1px; top:6%; opacity:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
  }
  .glow{
    position:absolute; width:64vmin; height:64vmin; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.10) 0%, rgba(255,255,255,.03) 38%, transparent 68%);
    filter:blur(8px); opacity:.85;
  }
  .noise{
    position:absolute; inset:0; opacity:.05; mix-blend-mode:screen;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .vignette{
    position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(130% 110% at 50% 50%, transparent 56%, rgba(0,0,0,.55) 100%);
  }

  /* ---------- content (resting state: fully visible) ---------- */
  .content{ position:relative; z-index:3; display:flex; flex-direction:column; align-items:center; }

  .wordmark{
    position:relative;
    display:flex; align-items:baseline; gap:.16em;
    font-size:clamp(58px, 13.5vw, 168px);
    font-weight:600; letter-spacing:-.03em; line-height:1;
    padding:0 .04em;
  }
  .slashes{
    font-family:"Geist Mono",ui-monospace,monospace;
    font-weight:500; font-size:.62em; color:var(--slash);
    transform:translateY(.16em);
  }
  .name{ display:inline-flex; color:var(--paper); }
  .name span{ display:inline-block; }

  .sweep{
    position:absolute; inset:-10% -6%;
    background:linear-gradient(105deg, transparent 38%, rgba(255,255,255,.42) 50%, transparent 62%);
    mix-blend-mode:screen; transform:translateX(-130%); pointer-events:none;
  }

  .rule{
    margin-top:.9rem; height:1px; width:min(58vw,560px);
    background:linear-gradient(90deg, transparent, var(--line-2) 18%, var(--line-2) 82%, transparent);
    transform:scaleX(1); transform-origin:center;
  }
  .tag{
    margin-top:1.05rem;
    font-size:clamp(11px,1.45vw,15px);
    letter-spacing:.42em; text-transform:uppercase;
    color:var(--muted); font-weight:500; padding-left:.42em;
  }

  .probe{
    position:absolute; bottom:clamp(28px,6vh,64px); left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:"Geist Mono",ui-monospace,monospace;
    font-size:clamp(11px,1.25vw,13px); color:var(--muted); white-space:nowrap;
  }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--live); flex:none; }
  .ell{ display:inline-block; width:1.4em; text-align:left; letter-spacing:.12em }
  .ell::after{ content:"…" }

  .bar{
    position:absolute; bottom:clamp(18px,4.4vh,44px); left:50%; transform:translateX(-50%);
    width:min(40vw,300px); height:1px; overflow:hidden; background:var(--line);
  }
  .bar::before{
    content:""; position:absolute; top:0; bottom:0; width:34%; left:-40%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
  }

  /* ---------- motion: only when the user accepts it ---------- */
  @media (prefers-reduced-motion: no-preference){
    .stage{ animation:stageIn 1s var(--ease-out) both; }
    @keyframes stageIn{ from{opacity:0} to{opacity:1} }

    .grid{ animation:gridIn 1.6s var(--ease-out) .15s both, gridDrift 32s linear 1.6s infinite; }
    @keyframes gridIn{ from{opacity:0; transform:scale(1.04)} to{opacity:1; transform:none} }
    @keyframes gridDrift{ from{background-position:0 0,0 0} to{background-position:64px 64px,64px 64px} }

    .scan{ animation:scan 5.5s var(--ease) 1.2s infinite; }
    @keyframes scan{ 0%{top:6%;opacity:0} 6%{opacity:.55} 26%{top:88%;opacity:0} 100%{top:88%;opacity:0} }

    .glow{ animation:breathe 7s ease-in-out infinite; }
    @keyframes breathe{ 0%,100%{transform:scale(.92);opacity:.6} 50%{transform:scale(1.06);opacity:1} }

    .noise{ animation:grain 1.2s steps(3) infinite; }
    @keyframes grain{ 0%{transform:translate(0,0)} 33%{transform:translate(-4px,3px)} 66%{transform:translate(3px,-2px)} 100%{transform:translate(0,0)} }

    .slashes{ animation:slashIn .7s var(--ease-out) .35s both, slashPulse 3.6s ease-in-out 2.4s infinite; }
    @keyframes slashIn{
      0%{ opacity:0; transform:translateY(.16em) translateX(-.22em); filter:blur(6px) }
      100%{ opacity:1; transform:translateY(.16em) translateX(0); filter:blur(0) }
    }
    @keyframes slashPulse{ 0%,100%{opacity:.62} 50%{opacity:1} }

    .name span{ opacity:0; animation:letterIn .9s var(--ease-out) both; }
    .name span:nth-child(1){ animation-delay:.74s }
    .name span:nth-child(2){ animation-delay:.84s }
    .name span:nth-child(3){ animation-delay:.94s }
    .name span:nth-child(4){ animation-delay:1.04s }
    @keyframes letterIn{
      0%{ opacity:0; transform:translateY(.62em) scale(.96); filter:blur(8px) }
      60%{ filter:blur(0) }
      100%{ opacity:1; transform:translateY(0) scale(1); filter:blur(0) }
    }

    .sweep{ animation:sweep 6.5s var(--ease) 1.7s infinite; }
    @keyframes sweep{ 0%{transform:translateX(-130%)} 16%{transform:translateX(130%)} 100%{transform:translateX(130%)} }

    .rule{ transform:scaleX(0); animation:ruleIn 1.1s var(--ease-out) 1.45s both; }
    @keyframes ruleIn{ to{ transform:scaleX(1) } }

    .tag{ opacity:0; transform:translateY(8px); animation:tagIn 1.1s var(--ease-out) 1.95s both; }
    @keyframes tagIn{
      0%{ opacity:0; transform:translateY(8px); letter-spacing:.62em }
      100%{ opacity:1; transform:translateY(0); letter-spacing:.42em }
    }

    .probe{ opacity:0; animation:probeIn 1s var(--ease-out) 2.35s both; }
    @keyframes probeIn{ to{ opacity:1 } }
    .dot{ animation:dotPulse 2.4s ease-out infinite; }
    @keyframes dotPulse{
      0%{ box-shadow:0 0 0 0 rgba(74,222,128,.5); opacity:1 }
      70%{ box-shadow:0 0 0 7px rgba(74,222,128,0); opacity:.85 }
      100%{ box-shadow:0 0 0 0 rgba(74,222,128,0); opacity:1 }
    }
    .ell::after{ content:""; animation:ell 1.6s steps(1) infinite }
    @keyframes ell{ 0%{content:""} 25%{content:"."} 50%{content:".."} 75%{content:"..."} 100%{content:""} }

    .bar{ opacity:0; animation:probeIn 1s var(--ease-out) 2.5s both; }
    .bar::before{ animation:slide 2.1s var(--ease) infinite; }
    @keyframes slide{ 0%{left:-40%} 100%{left:110%} }
  }

</style>
</head>
<body>
  <div class="stage" data-screen-label="Arke launch screen">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="scan"></div>
    <div class="noise"></div>

    <div class="content">
      <div class="wordmark">
        <span class="slashes">//</span>
        <span class="name"><span>A</span><span>r</span><span>k</span><span>e</span></span>
        <span class="sweep"></span>
      </div>
      <div class="rule"></div>
      <div class="tag">Specification orchestrator</div>
    </div>

    <div class="probe">
      <span class="dot"></span>
      <span>probing harness</span><span class="ell"></span>
    </div>
    <div class="bar"></div>

    <div class="vignette"></div>
  </div>

  <template id="__bundler_thumbnail" data-bg-color="#09090A">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#09090A"/>
      <text x="50" y="46" text-anchor="middle" font-family="monospace" font-size="15" fill="#9DA3A8">//</text>
      <text x="50" y="66" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="16" fill="#FAFAFA">Arke</text>
    </svg>
  </template>
</body>
</html>
