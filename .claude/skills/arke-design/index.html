<style>
  :root { --page-pad: 24px; --nav-pad: 8px 10px; }
  [data-density="compact"] { --page-pad: 16px; --nav-pad: 6px 9px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--background); color: var(--foreground); }
  #app { width: 100vw; height: 100vh; overflow: hidden; font-family: var(--font-sans); }
  button { font-family: inherit; }
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: none; box-shadow: var(--shadow-focus);
  }
  /* live entrance — transform only, never opacity, so content is ALWAYS visible
     even if the animation is throttled/paused at frame 0 (background iframe, print) */
  @keyframes soEnter { from { transform: translateY(6px); } to { transform: none; } }
  .so-enter { animation: soEnter 260ms var(--ease-out, ease-out) both; }
  /* subtle scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--muted-foreground) 28%, transparent); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: color-mix(in srgb, var(--muted-foreground) 45%, transparent); background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  @media (prefers-reduced-motion: reduce) { .so-enter { animation: none; } }
</style>
