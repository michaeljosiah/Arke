name: release

# Cut a release when a version tag is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Gates on typecheck + tests, then packages the release artifacts and publishes a GitHub Release:
#   - arke-client-<ver>.zip        — the built React client (static dist/)
#   - arke-source-<ver>.zip        — the workspace source (coordinator runs from source via tsx)
#   - arke-cli-win-x64-<ver>.zip   — self-contained Arke CLI for Windows
#   - arke-cli-linux-x64-<ver>.zip — self-contained Arke CLI for Linux
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package client
        run: |
          VER="${GITHUB_REF_NAME#v}"
          (cd packages/client/dist && zip -r "$GITHUB_WORKSPACE/arke-client-$VER.zip" .)

      - name: Package source (coordinator + workspaces)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          git archive --format=zip -o "arke-source-$VER.zip" HEAD

      - name: Publish CLI (win-x64 + linux-x64)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          dotnet publish cli/Arke.Cli/Arke.Cli.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:Version="$VER" -o out/win-x64
          dotnet publish cli/Arke.Cli/Arke.Cli.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -p:Version="$VER" -o out/linux-x64
          (cd out/win-x64 && zip -r "$GITHUB_WORKSPACE/arke-cli-win-x64-$VER.zip" .)
          (cd out/linux-x64 && zip -r "$GITHUB_WORKSPACE/arke-cli-linux-x64-$VER.zip" .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Arke ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            arke-client-*.zip
            arke-source-*.zip
            arke-cli-win-x64-*.zip
            arke-cli-linux-x64-*.zip
